<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="batBg2" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#164e63"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="cryB" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="5" fill="url(#batBg2)"/>

  <!-- small bat top-left -->
  <g opacity=".92">
    <rect x="4" y="12" width="20" height="6" fill="#4c1d95"/>
    <rect x="8" y="8" width="4" height="8" fill="#a855f7"/>
    <rect x="14" y="8" width="4" height="8" fill="#a855f7"/>
    <rect x="10" y="16" width="4" height="4" fill="#22d3ee"/>
    <rect x="14" y="16" width="4" height="4" fill="#22d3ee"/>
  </g>

  <!-- leader bat centre (pure pixel rects) -->
  <g transform="translate(0,14)">
    <!-- wings membranes -->
    <rect x="2" y="22" width="16" height="4" fill="#7c3aed"/>
    <rect x="46" y="22" width="16" height="4" fill="#7c3aed"/>
    <rect x="8" y="18" width="12" height="6" fill="#7c3aed"/>
    <rect x="44" y="18" width="12" height="6" fill="#7c3aed"/>
    <rect x="12" y="14" width="8" height="6" fill="#f472b6" opacity=".85"/>
    <rect x="44" y="14" width="8" height="6" fill="#f472b6" opacity=".85"/>
    <!-- ears -->
    <rect x="26" y="14" width="4" height="8" fill="#c084fc"/>
    <rect x="34" y="14" width="4" height="8" fill="#c084fc"/>
    <!-- face -->
    <rect x="24" y="20" width="16" height="16" fill="#4c1d95"/>
    <rect x="26" y="28" width="4" height="4" fill="#22d3ee"/>
    <rect x="34" y="28" width="4" height="4" fill="#22d3ee"/>
    <rect x="28" y="34" width="8" height="2" fill="#fbcfe8"/>
    <rect x="28" y="36" width="2" height="4" fill="#fff"/>
    <rect x="34" y="36" width="2" height="4" fill="#fff"/>
    <!-- tummy -->
    <rect x="28" y="30" width="8" height="10" fill="#6d28d9"/>
    <rect x="26" y="38" width="12" height="6" fill="#5b21b6"/>
    <!-- claws -->
    <rect x="26" y="44" width="3" height="4" fill="#4c2889"/>
    <rect x="30" y="44" width="4" height="4" fill="#4c2889"/>
    <rect x="35" y="44" width="3" height="4" fill="#4c2889"/>
  </g>

  <!-- mini bat bottom-right -->
  <g opacity=".9">
    <rect x="42" y="46" width="16" height="5" fill="#4c1d95"/>
    <rect x="46" y="42" width="3" height="6" fill="#a855f7"/>
    <rect x="51" y="42" width="3" height="6" fill="#a855f7"/>
    <rect x="47" y="48" width="3" height="3" fill="#67e8f9"/>
  </g>

  <!-- crystal shards (unified motif) -->
  <path d="M2 62 L8 40 L14 62 Z" fill="url(#cryB)" opacity=".65"/>
  <path d="M54 62 L58 42 L62 62 Z" fill="url(#cryB)" opacity=".6"/>
  <rect x="54" y="6" width="3" height="3" fill="#f0abfc" opacity=".8"/>
</svg>
