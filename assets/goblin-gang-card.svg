<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <rect width="32" height="32" rx="4" fill="#14532d"/>
  <rect x="2" y="2" width="28" height="28" rx="3" fill="#166534"/>
  <!-- Back row: spear tips (brown) -->
  <g fill="#78716c">
    <rect x="6" y="4" width="1" height="5"/>
    <rect x="15" y="3" width="1" height="6"/>
    <rect x="24" y="4" width="1" height="5"/>
  </g>
  <!-- Spear goblins (smaller, upper) -->
  <g fill="#4ade80">
    <rect x="4" y="10" width="5" height="4"/>
    <rect x="5" y="9" width="3" height="2" fill="#bbf7d0"/>
    <rect x="13" y="9" width="5" height="4"/>
    <rect x="14" y="8" width="3" height="2" fill="#86efac"/>
    <rect x="22" y="10" width="5" height="4"/>
    <rect x="23" y="9" width="3" height="2" fill="#bbf7d0"/>
  </g>
  <!-- Melee goblins (larger, lower) -->
  <g fill="#22c55e">
    <rect x="3" y="18" width="6" height="5"/>
    <rect x="4" y="17" width="4" height="2" fill="#dcfce7"/>
    <rect x="13" y="19" width="6" height="5"/>
    <rect x="14" y="18" width="4" height="2" fill="#bbf7d0"/>
    <rect x="23" y="18" width="6" height="5"/>
    <rect x="24" y="17" width="4" height="2" fill="#dcfce7"/>
  </g>
  <rect x="11" y="22" width="10" height="6" fill="#16a34a"/>
  <rect x="12" y="21" width="8" height="2" fill="#86efac"/>
</svg>
