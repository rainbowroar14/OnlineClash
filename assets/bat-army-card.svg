    <rect x="6" y="11" width="1" height="1" fill="#22d3ee"/>
  </g>
  <g opacity="0.9">
    <!-- bat @12,3 -->
    <rect x="14" y="4" width="1" height="2" fill="#e9d5ff"/>
    <rect x="17" y="4" width="1" height="2" fill="#e9d5ff"/>
    <rect x="13" y="6" width="7" height="2" fill="#a855f7"/>
    <rect x="15" y="8" width="3" height="3" fill="#5b21b6"/>
    <rect x="16" y="9" width="1" height="1" fill="#67e8f9"/>
