    <rect x="26" y="22" width="1" height="2" fill="#e9d5ff"/>
    <rect x="22" y="24" width="7" height="2" fill="#8b5cf6"/>
    <rect x="24" y="26" width="3" height="2" fill="#4c1d95"/>
    <rect x="25" y="27" width="1" height="1" fill="#bae6fd"/>
  </g>
  <!-- stray wing tips / silhouette overlap -->
  <rect x="1" y="10" width="3" height="1" fill="#7c3aed" opacity="0.5"/>
  <rect x="28" y="11" width="3" height="1" fill="#a855f7" opacity="0.45"/>
  <rect x="9" y="28" width="4" height="1" fill="#6d28d9" opacity="0.55"/>
