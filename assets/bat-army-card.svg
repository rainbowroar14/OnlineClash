    <rect x="3" y="6" width="1" height="2" fill="#c084fc"/>
    <rect x="6" y="6" width="1" height="2" fill="#c084fc"/>
    <rect x="2" y="8" width="7" height="2" fill="#7c3aed"/>
    <rect x="4" y="10" width="3" height="3" fill="#4c1d95"/>
