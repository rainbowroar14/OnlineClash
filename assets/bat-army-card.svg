    <rect x="6" y="22" width="1" height="1" fill="#a855f7"/>
    <rect x="2" y="23" width="7" height="1" fill="#7c3aed"/>
    <rect x="4" y="24" width="3" height="2" fill="#5b21b6"/>
    <rect x="5" y="25" width="1" height="1" fill="#67e8f9"/>
  </g>
  <g opacity="0.87">
    <!-- bat @12,23 -->
    <rect x="14" y="24" width="1" height="2" fill="#c084fc"/>
    <rect x="17" y="24" width="1" height="2" fill="#c084fc"/>
    <rect x="12" y="26" width="9" height="2" fill="#6d28d9"/>
