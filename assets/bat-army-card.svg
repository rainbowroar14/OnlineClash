    <rect x="20" y="16" width="2" height="2" fill="#9333ea"/>
    <rect x="16" y="19" width="4" height="4" fill="#4c1d95"/>
    <rect x="17" y="20" width="1" height="1" fill="#22d3ee"/>
    <rect x="19" y="20" width="1" height="1" fill="#22d3ee"/>
    <rect x="17" y="22" width="2" height="1" fill="#fbcfe8"/>
  </g>
  <g opacity="0.85">
