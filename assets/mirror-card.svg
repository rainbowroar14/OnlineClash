<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="mirCtr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="mirGold" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="50%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <linearGradient id="ribs" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <!-- card backing -->
  <rect width="64" height="64" rx="6" fill="#eef2ff"/>
  <!-- chunky outer bezel -->
  <rect x="6" y="6" width="52" height="52" rx="3" fill="url(#ribs)"/>
  <!-- horizontal rib texture (pixel grooves) -->
  <g fill="#334155">
    <rect x="10" y="14" width="44" height="2" opacity=".5"/>
    <rect x="10" y="22" width="44" height="2" opacity=".5"/>
    <rect x="10" y="54" width="44" height="2" opacity=".5"/>
  </g>
  <!-- gold corner brackets -->
  <g fill="url(#mirGold)" stroke="#854d0e" stroke-width="0.75">
    <path d="M8 10h12v4H12v12H8z"/>
    <path d="M52 10H40v4h8v12h4z"/>
    <path d="M8 54h4V42H8v16h14v6H8"/>
    <path d="M56 54H42v4h14V42h4z"/>
  </g>
  <!-- studs -->
  <rect x="13" y="13" width="4" height="4" rx="2" fill="#fde68a" stroke="#a16207" stroke-width="0.75"/>
  <rect x="47" y="13" width="4" height="4" rx="2" fill="#fde68a" stroke="#a16207" stroke-width="0.75"/>
  <rect x="13" y="47" width="4" height="4" rx="2" fill="#fde68a" stroke="#a16207" stroke-width="0.75"/>
  <rect x="47" y="47" width="4" height="4" rx="2" fill="#fde68a" stroke="#a16207" stroke-width="0.75"/>
  <!-- cyan “empty” reflective field -->
  <rect x="20" y="18" width="24" height="28" fill="url(#mirCtr)" stroke="#bae6fd" stroke-width="1"/>
  <!-- glints (reflection) -->
  <rect x="34" y="22" width="4" height="12" fill="#e0f2fe" opacity=".35"/>
  <rect x="24" y="28" width="6" height="3" fill="#f472b8" opacity=".45"/>
  <rect x="26" y="34" width="4" height="3" fill="#fbbf24" opacity=".4"/>
</svg>
