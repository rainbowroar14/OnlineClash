<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="skyR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#bae6fd"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <linearGradient id="flameR" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="40%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="5" fill="url(#skyR)"/>
  <!-- chunky pixel frame hints -->
  <rect x="0" y="0" width="64" height="4" fill="#0f172acc"/>
  <rect x="0" y="60" width="64" height="4" fill="#0f172acc"/>
  <rect x="0" y="0" width="4" height="64" fill="#0f172acc"/>
  <rect x="60" y="0" width="4" height="64" fill="#0f172acc"/>
  <!-- angled rocket built from px cells (scale 4) -->
  <!-- exhaust / flame bursts -->
  <rect x="20" y="52" width="8" height="8" fill="url(#flameR)"/>
  <rect x="36" y="52" width="8" height="8" fill="url(#flameR)"/>
  <rect x="24" y="48" width="16" height="8" fill="#fbbf24"/>
  <rect x="28" y="44" width="8" height="8" fill="#fb923c"/>
  <!-- main tube -->
  <rect x="24" y="28" width="16" height="20" fill="#94a3b8"/>
  <rect x="20" y="32" width="4" height="12" fill="#64748b"/>
  <rect x="40" y="32" width="4" height="12" fill="#64748b"/>
  <!-- window band -->
  <rect x="22" y="32" width="20" height="12" fill="#475569"/>
  <rect x="24" y="34" width="16" height="8" fill="#1e293b"/>
  <!-- pixel skull silhouette -->
  <rect x="28" y="36" width="4" height="4" fill="#f8fafc"/>
  <rect x="32" y="36" width="4" height="4" fill="#f8fafc"/>
  <rect x="30" y="40" width="4" height="4" fill="#f8fafc"/>
  <!-- fins -->
  <rect x="14" y="36" width="8" height="4" fill="#cbd5e1"/>
  <rect x="42" y="36" width="8" height="4" fill="#cbd5e1"/>
  <!-- nose cone -->
  <rect x="28" y="20" width="8" height="8" fill="#334155"/>
  <rect x="30" y="16" width="4" height="8" fill="#1e293b"/>
  <!-- glint sparks -->
  <rect x="10" y="12" width="4" height="4" fill="#fef9c3" opacity=".9"/>
  <rect x="50" y="18" width="4" height="4" fill="#fef9c3" opacity=".75"/>
</svg>
